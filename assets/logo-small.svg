    <circle cx="23" cy="26" r="5"/>
    <rect x="35" y="22" width="30" height="8" rx="4"/>

    <circle cx="23" cy="40" r="5"/>
    <rect x="35" y="36" width="30" height="8" rx="4"/>

    <circle cx="23" cy="54" r="5"/>
    <rect x="35" y="50" width="30" height="8" rx="4"/>
  </g>
</svg>
